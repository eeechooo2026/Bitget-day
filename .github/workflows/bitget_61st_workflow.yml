name: Bitget 第61个工作流 - 1小时级别收阴+收盘>MA5扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 61st workflow scan
        run: python scanner_61st_workflow.py
