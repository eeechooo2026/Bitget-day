name: Bitget 第67个工作流 - 日线级别阳-阴(震荡)-阳形态扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 67th workflow scan
        run: python scanner_67th_workflow.py
