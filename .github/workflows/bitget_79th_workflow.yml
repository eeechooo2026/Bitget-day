name: Bitget 第79个工作流 - 1小时级别KDJ金叉+形态扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 79th workflow scan
        run: python scanner_79th_workflow.py
