name: Bitget 第68个工作流 - 周线级别涨幅和排行（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 68th workflow scan
        run: python scanner_68th_workflow.py
