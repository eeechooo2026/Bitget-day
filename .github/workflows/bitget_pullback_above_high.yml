name: Bitget 回调扫描 - 涨幅超10%昨日收阳但未破前高

on:
  schedule:
    # 每天北京时间 09:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run pullback above high scan
        run: python scanner_pullback_above_high.py
