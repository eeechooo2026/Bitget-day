name: Bitget 第64个工作流 - 月线级别连续三根收阳扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 64th workflow scan
        run: python scanner_64th_workflow.py
