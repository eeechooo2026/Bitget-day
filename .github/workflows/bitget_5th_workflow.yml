name: Bitget 第五个工作流 - 4小时级别扫描（收盘价>MA5+震荡+J>K>D）

on:
  schedule:
    - cron: '1 0,4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 5th workflow scan
        run: python scanner_5th_workflow.py
