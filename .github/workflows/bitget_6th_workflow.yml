name: Bitget 第六个工作流 - 1小时级别扫描（随机排序）

on:
  schedule:
    # 北京时间每个整点 = UTC 前1小时的00分
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 6th workflow scan
        run: python scanner_6th_workflow.py
