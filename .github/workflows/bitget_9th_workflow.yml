name: Bitget 第九个工作流 - 1小时级别空头扫描

on:
  schedule:
    # 北京时间每个整点运行（UTC时间前1小时）
    # 例如北京时间8:00对应UTC 0:00，这里设置0分执行
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 9th workflow scan
        run: python scanner_9th_workflow.py
