name: Bitget 第59个工作流 - 4小时级别突破扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 59th workflow scan
        run: python scanner_59th_workflow.py
