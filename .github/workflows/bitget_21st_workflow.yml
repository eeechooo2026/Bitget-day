name: Bitget 第21个工作流 - 1小时级别跌幅榜（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 21st workflow scan
        run: python scanner_21st_workflow.py
