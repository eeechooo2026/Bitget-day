name: Bitget 第26个工作流 - 15分钟级别（仅上涨K棒，按涨幅×杠杆/100排序，手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 26th workflow scan
        run: python scanner_26th_workflow.py
