name: Bitget 第七个工作流 - 4小时级别扫描（收阳+低点降低+KDJ条件）

on:
  schedule:
    - cron: '1 0,4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 7th workflow scan
        run: python scanner_7th_workflow.py
