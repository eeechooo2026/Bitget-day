name: Bitget 第84个工作流 - 双周期KDJ空头排列+形态扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 84th workflow scan
        run: python scanner_84th_workflow.py
