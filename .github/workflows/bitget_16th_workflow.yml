name: Bitget 第16个工作流 - 1小时级别双K线涨幅榜（手动运行）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 16th workflow scan
        run: python scanner_16th_workflow.py
