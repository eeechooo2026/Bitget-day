name: Bitget 第25个工作流 - 1小时级别（仅下跌K棒，按|跌幅|×杠杆/100排序，手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 25th workflow scan
        run: python scanner_25th_workflow.py
