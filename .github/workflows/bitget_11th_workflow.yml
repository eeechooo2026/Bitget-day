name: Bitget 11th工作流 - 4小时级别双震荡空头扫描

on:
  schedule:
    - cron: '1 0,4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 5th bearish workflow scan
        run: python scanner_5th_bearish.py
