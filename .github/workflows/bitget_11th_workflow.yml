name: Bitget 第十一个工作流 - 4小时级别空头扫描（基于第五个逻辑）

on:
  schedule:
    # 每天北京时间 8:01, 12:01, 16:01, 20:01, 00:01
    # 对应 UTC 0:01, 4:01, 8:01, 12:01, 16:01
    - cron: '1 0,4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 11th workflow scan
        run: python scanner_11th_workflow.py
