name: Bitget 第40个工作流 - 日线级别（上根收阳+收盘<MA20）扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 40th workflow scan
        run: python scanner_40th_workflow.py
