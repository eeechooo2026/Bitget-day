name: Bitget 第22个工作流 - 15分钟级别涨幅榜（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 22nd workflow scan
        run: python scanner_22nd_workflow.py
