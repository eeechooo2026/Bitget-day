name: Bitget 第38个工作流 - 4小时级别（上根<MA20+震荡+上上根收阴）扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 38th workflow scan
        run: python scanner_38th_workflow.py
