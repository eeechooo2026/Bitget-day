name: Bitget 合约扫描 - 杠杆≥50倍（趋势+量能版）

on:
  schedule:
    # 北京时间 9:15 = UTC 1:15
    - cron: '15 1 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run scan
        run: python scanner_gainer_pullback.py
