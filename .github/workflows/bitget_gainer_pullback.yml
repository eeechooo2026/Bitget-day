name: Bitget 涨幅回调扫描 - 前天涨超10%昨日收跌

on:
  schedule:
    # 每天北京时间 09:00 执行 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行扫描脚本
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python scanner_gainer_pullback.py
