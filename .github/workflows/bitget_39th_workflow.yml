name: Bitget 第39个工作流 - 日线级别KDJ金叉+前低扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 39th workflow scan
        run: python scanner_39th_workflow.py
