name: Bitget 第18个工作流 - 4小时级别 跌幅×杠杆/100 排行（空头版）

on:
  schedule:
    - cron: '1 0,4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 42nd workflow scan
        run: python scanner_42nd_workflow.py
