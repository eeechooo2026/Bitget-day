name: Bitget 第32个工作流 - 1小时级别均线多头+阴阳形态扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 32nd workflow scan
        run: python scanner_32nd_workflow.py
