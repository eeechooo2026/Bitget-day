name: Bitget 第57个工作流 - 15分钟级别均线多头+收阴扫描（手动触发）

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run 57th workflow scan
        run: python scanner_57th_workflow.py
